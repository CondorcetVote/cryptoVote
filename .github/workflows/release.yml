# Release pipeline — builds the four distributable artefacts and
# attaches them to a GitHub Release.
#
# Triggered by pushing an annotated tag of the form `vX.Y.Z`. Manual
# dispatch is also supported so a maintainer can dry-run the matrix
# without cutting a tag.
#
# Artefacts produced:
#
#   1. cryptovote-x86_64-unknown-linux-gnu.tar.gz   — x64 Linux CLI (glibc-linked)
#   2. cryptovote-x86_64-unknown-linux-musl.tar.gz  — x64 Linux CLI (fully static musl)
#   3. cryptovote-aarch64-unknown-linux-gnu.tar.gz  — ARM64 Linux CLI (glibc-linked)
#   4. cryptovote-aarch64-unknown-linux-musl.tar.gz — ARM64 Linux CLI (fully static musl)
#   5. cryptovote-riscv64gc-unknown-linux-gnu.tar.gz — RISC-V 64 Linux CLI (glibc-linked)
#   6. cryptovote-aarch64-apple-darwin.tar.gz       — Apple Silicon macOS CLI
#   7. crypto_vote-wasm-browser.tar.gz              — wasm-pack bundle for browsers (wasm-bindgen)
#   8. crypto_vote-extism.tar.gz                    — single `.wasm` for every Extism host SDK
#
# Note on item 4: `wasm64-unknown-unknown` is a Tier 3 target requiring
# nightly Rust, and several transitive dependencies (notably
# `curve25519-dalek` and `rand`) do not currently advertise wasm64
# support. We therefore ship `wasm32-wasip1` as the documented fallback,
# matching the user's "ou wasm32 si les dépendances ne le gèrent pas".

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Native — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel an ARM build when an x86 row fails (or vice versa);
      # we want to see every breakage in one CI run.
      fail-fast: false
      matrix:
        include:
          # --- Linux glibc ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt: ""
          - target: aarch64-unknown-linux-gnu
            # ARMv9-A cores (Cortex-A510, A710, A720, X1+ …) are 64-bit
            # ARM and use the `aarch64` ISA, so this triple covers
            # "native armv9" too — there is no separate Rust triple for
            # ARMv9 because ARMv9-A *is* AArch64. GitHub-hosted x86
            # runners produce ARM64 glibc binaries via the standard gcc
            # cross-compiler — no QEMU, no `cross`.
            os: ubuntu-latest
            apt: "gcc-aarch64-linux-gnu"
          # --- Linux musl (fully static, runs on any distro) ---
          - target: x86_64-unknown-linux-musl
            # `musl-tools` provides `musl-gcc`, which Cargo picks up
            # automatically for the *-linux-musl host triple.
            os: ubuntu-latest
            apt: "musl-tools"
          - target: aarch64-unknown-linux-musl
            # No apt cross-toolchain needed: `rust-lld` (bundled with
            # rustup) handles cross-arch linking, and rustup ships a
            # precompiled musl libc for this target. The linker env var
            # below selects rust-lld for this triple specifically.
            os: ubuntu-latest
            apt: ""
          # --- RISC-V 64 Linux (glibc only — see file header for why) ---
          - target: riscv64gc-unknown-linux-gnu
            # Tier 2 with host tools. Same pattern as aarch64-gnu: an apt
            # cross-toolchain provides the linker driver (`riscv64-linux-
            # gnu-gcc`) plus the matching crt and libc. No QEMU needed.
            os: ubuntu-latest
            apt: "gcc-riscv64-linux-gnu"
          # --- Apple Silicon macOS ---
          - target: aarch64-apple-darwin
            # macos-latest is Apple Silicon (M-series), so this build is
            # native — the Xcode CLT preinstalled on the runner provides
            # the linker. Intel macs (`x86_64-apple-darwin`) are not
            # shipped: GitHub-hosted Intel macOS runners were retired and
            # this project has no demand for a Rosetta-only artefact.
            os: macos-latest
            apt: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (apt)
        # Skipped automatically on macOS rows (no `apt:` value) and on
        # the aarch64-musl row (uses rust-lld instead of a system gcc).
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        # Each CARGO_TARGET_*_LINKER var is only consulted when its
        # triple is the active target, so setting all of them at once
        # is harmless on the rows that don't need them.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} --bin cryptovote

      - name: Package binary
        id: pkg
        run: |
          STAGING="cryptovote-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/cryptovote "$STAGING/"
          cp README.md "$STAGING/" 2>/dev/null || true
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          # Print sha256 alongside the artefact for downstream verification.
          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "archive=${STAGING}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: cryptovote-${{ matrix.target }}
          path: |
            cryptovote-${{ matrix.target }}.tar.gz
            cryptovote-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  build-wasm-browser:
    name: WASM — browser (wasm32-unknown-unknown via wasm-pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Install wasm-pack
        # The official installer is faster than `cargo install`. It
        # downloads a prebuilt binary that matches the runner arch.
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build browser bundle
        # `--target web` emits ESM glue suitable for native ES modules
        # in a browser. The `wasm` feature gates the wasm-bindgen
        # surface; `--no-default-features` drops the CLI bin from the
        # build graph so clap doesn't get pulled into the bundle.
        run: |
          wasm-pack build \
            --release \
            --target web \
            --out-dir pkg-browser \
            -- \
            --no-default-features \
            --features wasm \
            --locked

      - name: Package browser bundle
        run: |
          tar -czf crypto_vote-wasm-browser.tar.gz pkg-browser
          sha256sum crypto_vote-wasm-browser.tar.gz > crypto_vote-wasm-browser.tar.gz.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: crypto_vote-wasm-browser
          path: |
            crypto_vote-wasm-browser.tar.gz
            crypto_vote-wasm-browser.tar.gz.sha256
          if-no-files-found: error

  build-wasm-extism:
    name: WASM — Extism plugin (wasm32-wasip1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (wasm32-wasip1)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1-extism

      - name: Build Extism plugin
        # Same target triple as the plain WASI build, but with the
        # `extism` feature on instead of the default `cli`. WASI's
        # `random_get` feeds `SysRng` directly, so no extra getrandom
        # backend is needed. The resulting `.wasm` runs in every Extism
        # host SDK (browser via `@extism/extism`, Node, Python, Go, …).
        run: cargo build --release --locked --target wasm32-wasip1 --lib --no-default-features --features extism

      - name: Package Extism plugin
        run: |
          STAGING="crypto_vote-extism"
          mkdir "$STAGING"
          cp target/wasm32-wasip1/release/crypto_vote.wasm "$STAGING/crypto_vote-extism.wasm"
          cp README.md "$STAGING/" 2>/dev/null || true
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: crypto_vote-extism
          path: |
            crypto_vote-extism.tar.gz
            crypto_vote-extism.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    # Only fire when the workflow was triggered by a tag push. Manual
    # `workflow_dispatch` runs still build the artefacts above (useful
    # for smoke-testing the pipeline) but skip the release step.
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-native
      - build-wasm-browser
      - build-wasm-extism
    runs-on: ubuntu-latest
    permissions:
      # `softprops/action-gh-release` needs write access to create the
      # release and upload assets via the GitHub REST API.
      contents: write
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts

      - name: Flatten artefact tree
        # `download-artifact` nests each artefact under its name; the
        # release uploader takes a flat file list, so we move everything
        # into one directory.
        run: |
          mkdir release-files
          find artefacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec mv {} release-files/ \;
          ls -la release-files

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
