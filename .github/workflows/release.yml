# Release pipeline — builds the distributable artefacts, attaches them
# to a GitHub Release, and publishes the npm package.
#
# Triggered by pushing an annotated tag of the form `vX.Y.Z`. Manual
# dispatch is also supported so a maintainer can dry-run the matrix
# without cutting a tag.
#
# Artefacts produced:
#
#   1. cryptovote-x86_64-unknown-linux-gnu.tar.gz   — x64 Linux CLI (glibc-linked)
#   2. cryptovote-x86_64-unknown-linux-musl.tar.gz  — x64 Linux CLI (fully static musl)
#   3. cryptovote-aarch64-unknown-linux-gnu.tar.gz  — ARM64 Linux CLI (glibc-linked)
#   4. cryptovote-aarch64-unknown-linux-musl.tar.gz — ARM64 Linux CLI (fully static musl)
#   5. cryptovote-riscv64gc-unknown-linux-gnu.tar.gz — RISC-V 64 Linux CLI (glibc-linked)
#   6. cryptovote-aarch64-apple-darwin.tar.gz       — Apple Silicon macOS CLI
#   7. crypto_vote-wasm-browser.tar.gz              — wasm-pack bundle for browsers (wasm-bindgen,
#                                                     --target web: native ESM, no bundler needed)
#   8. crypto_vote-extism.wasm                      — single `.wasm` for every Extism host SDK
#                                                     (shipped raw, not tarred: it is a single
#                                                     file fed straight to a host SDK, and the
#                                                     .sha256 then attests the exact bytes loaded)
#
# npm:
#   @condorcet.vote/crypto-vote                      — wasm-pack bundle for bundlers (webpack,
#                                                     vite, rollup; --target bundler). Published
#                                                     to npmjs.com on every tag push. Requires
#                                                     an NPM_TOKEN secret with Automation scope.
#
# Note on item 4: `wasm64-unknown-unknown` is a Tier 3 target requiring
# nightly Rust, and several transitive dependencies (notably
# `curve25519-dalek` and `rand`) do not currently advertise wasm64
# support. We therefore ship `wasm32-wasip1` as the documented fallback,
# matching the user's "ou wasm32 si les dépendances ne le gèrent pas".

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Native — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel an ARM build when an x86 row fails (or vice versa);
      # we want to see every breakage in one CI run.
      fail-fast: false
      matrix:
        include:
          # --- Linux glibc ---
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt: ""
          - target: aarch64-unknown-linux-gnu
            # ARMv9-A cores (Cortex-A510, A710, A720, X1+ …) are 64-bit
            # ARM and use the `aarch64` ISA, so this triple covers
            # "native armv9" too — there is no separate Rust triple for
            # ARMv9 because ARMv9-A *is* AArch64. GitHub-hosted x86
            # runners produce ARM64 glibc binaries via the standard gcc
            # cross-compiler — no QEMU, no `cross`.
            os: ubuntu-latest
            apt: "gcc-aarch64-linux-gnu"
          # --- Linux musl (fully static, runs on any distro) ---
          - target: x86_64-unknown-linux-musl
            # `musl-tools` provides `musl-gcc`, which Cargo picks up
            # automatically for the *-linux-musl host triple.
            os: ubuntu-latest
            apt: "musl-tools"
          - target: aarch64-unknown-linux-musl
            # No apt cross-toolchain needed: `rust-lld` (bundled with
            # rustup) handles cross-arch linking, and rustup ships a
            # precompiled musl libc for this target. The linker env var
            # below selects rust-lld for this triple specifically.
            os: ubuntu-latest
            apt: ""
          # --- RISC-V 64 Linux (glibc only — see file header for why) ---
          - target: riscv64gc-unknown-linux-gnu
            # Tier 2 with host tools. Same pattern as aarch64-gnu: an apt
            # cross-toolchain provides the linker driver (`riscv64-linux-
            # gnu-gcc`) plus the matching crt and libc. No QEMU needed.
            os: ubuntu-latest
            apt: "gcc-riscv64-linux-gnu"
          # --- Apple Silicon macOS ---
          - target: aarch64-apple-darwin
            # macos-latest is Apple Silicon (M-series), so this build is
            # native — the Xcode CLT preinstalled on the runner provides
            # the linker. Intel macs (`x86_64-apple-darwin`) are not
            # shipped: GitHub-hosted Intel macOS runners were retired and
            # this project has no demand for a Rosetta-only artefact.
            os: macos-latest
            apt: ""
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (apt)
        # Skipped automatically on macOS rows (no `apt:` value) and on
        # the aarch64-musl row (uses rust-lld instead of a system gcc).
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        # Each CARGO_TARGET_*_LINKER var is only consulted when its
        # triple is the active target, so setting all of them at once
        # is harmless on the rows that don't need them.
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} --bin cryptovote

      - name: Package binary
        id: pkg
        run: |
          STAGING="cryptovote-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/cryptovote "$STAGING/"
          cp README.md "$STAGING/" 2>/dev/null || true
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          # Print sha256 alongside the artefact for downstream verification.
          sha256sum "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"
          echo "archive=${STAGING}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: cryptovote-${{ matrix.target }}
          path: |
            cryptovote-${{ matrix.target }}.tar.gz
            cryptovote-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  build-wasm-browser:
    name: WASM — browser (wasm32-unknown-unknown via wasm-pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown

      - name: Install wasm-pack
        # Why `cargo install` rather than the official installer script?
        # The `rustwasm.github.io/wasm-pack/installer/init.sh` URL is a
        # stale snapshot — the repo moved from `rustwasm/wasm-pack` to
        # `wasm-bindgen/wasm-pack` (July 2025) and the old Pages site
        # serves a frozen `init.sh` pinned to v0.13.1, which predates
        # support for the `--profile <name>` CLI flag we use for the
        # `wasm-release` Cargo profile. crates.io is always in sync with
        # the live releases, so `cargo install` is the reliable path.
        # `--locked` uses wasm-pack's own Cargo.lock for a reproducible
        # build.
        run: cargo install wasm-pack --locked

      - name: Build browser bundle
        # `--target web` emits ESM glue suitable for native ES modules
        # in a browser. The `wasm` feature gates the wasm-bindgen
        # surface; `--no-default-features` drops the CLI bin from the
        # build graph so clap doesn't get pulled into the bundle.
        # `--profile wasm-release` selects the WebAssembly-tuned profile
        # that pins `panic = "abort"` (see Cargo.toml for the rationale
        # — the plain `release` profile leaves panic at the default to
        # avoid the cdylib/cargo-bench build-graph collision).
        run: |
          wasm-pack build \
            --profile wasm-release \
            --target web \
            --out-dir pkg-browser \
            -- \
            --no-default-features \
            --features wasm \
            --locked

      - name: Package browser bundle
        run: |
          tar -czf crypto_vote-wasm-browser.tar.gz pkg-browser
          sha256sum crypto_vote-wasm-browser.tar.gz > crypto_vote-wasm-browser.tar.gz.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: crypto_vote-wasm-browser
          path: |
            crypto_vote-wasm-browser.tar.gz
            crypto_vote-wasm-browser.tar.gz.sha256
          if-no-files-found: error

  build-wasm-extism:
    name: WASM — Extism plugin (wasm32-wasip1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (wasm32-wasip1)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1-extism

      - name: Build Extism plugin
        # Same target triple as the plain WASI build, but with the
        # `extism` feature on instead of the default `cli`. WASI's
        # `random_get` feeds `SysRng` directly, so no extra getrandom
        # backend is needed. The resulting `.wasm` runs in every Extism
        # host SDK (browser via `@extism/extism`, Node, Python, Go, …).
        # `--profile wasm-release` picks the WASM-tuned profile that
        # adds `panic = "abort"` on top of release (see Cargo.toml).
        run: cargo build --profile wasm-release --locked --target wasm32-wasip1 --lib --no-default-features --features extism

      - name: Package Extism plugin
        # Ship the `.wasm` raw rather than tarred: it is a single file
        # handed straight to a host SDK (`extism call …`, @extism/extism,
        # the Python/Go/Rust SDKs), so there is nothing to extract and no
        # README to bundle. Hashing the bare file means the .sha256
        # attests exactly the bytes a host loads, with no tar/gzip
        # metadata in between.
        run: |
          cp target/wasm32-wasip1/wasm-release/crypto_vote.wasm crypto_vote-extism.wasm
          sha256sum crypto_vote-extism.wasm > crypto_vote-extism.wasm.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: crypto_vote-extism
          path: |
            crypto_vote-extism.wasm
            crypto_vote-extism.wasm.sha256
          if-no-files-found: error

  build-wasm-npm:
    name: WASM — npm bundle (wasm32-unknown-unknown via wasm-pack, bundler target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate key from the `web` build: both jobs can run in parallel
          # and would otherwise race writing to the same cache entry.
          key: wasm32-unknown-unknown-npm

      - name: Install wasm-pack
        # See `build-wasm-browser` for why `cargo install` rather than the
        # official installer script.
        run: cargo install wasm-pack --locked

      - name: Build npm bundle (bundler target)
        # `--target bundler` emits CommonJS/ESM glue compatible with webpack,
        # vite, and rollup. Unlike `--target web` the caller does not need an
        # explicit `await init()` call — the bundler handles WASM loading.
        run: |
          wasm-pack build \
            --profile wasm-release \
            --target bundler \
            --out-dir pkg-npm \
            -- \
            --no-default-features \
            --features wasm \
            --locked

      - uses: actions/upload-artifact@v7
        with:
          name: crypto_vote-wasm-npm
          path: pkg-npm/
          if-no-files-found: error

  publish-npm:
    name: Publish — npmjs (@condorcet.vote/crypto-vote)
    # Only fire on tag pushes. Manual `workflow_dispatch` runs build the
    # artefact above (useful for smoke-testing the pipeline) but skip
    # the publish step to avoid accidental releases.
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-wasm-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for OIDC Trusted Publishing: npm verifies the short-lived
      # id-token against the trusted publisher configuration set on npmjs.com.
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: crypto_vote-wasm-npm
          path: pkg-npm

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set package name and version
        # wasm-pack derives the package name from the Cargo crate name
        # (`crypto-vote`). Override it to the published scope + name, and
        # align the version with the git tag (strip the leading `v`).
        run: |
          cd pkg-npm
          npm pkg set name="@condorcet.vote/crypto-vote"
          npm pkg set version="${GITHUB_REF_NAME#v}"

      - name: Update npm for OIDC Trusted Publishing
        # OIDC Trusted Publishing requires npm >= 11.5.1; the runner ships
        # an older version.
        run: sudo npm install -g npm@latest

      - name: Publish to npm
        # `--access public` is required for scoped packages to be publicly
        # accessible. Authentication is handled by the OIDC id-token —
        # no NODE_AUTH_TOKEN needed.
        run: cd pkg-npm && npm publish --access public

  publish:
    name: Publish GitHub Release
    # Only fire when the workflow was triggered by a tag push. Manual
    # `workflow_dispatch` runs still build the artefacts above (useful
    # for smoke-testing the pipeline) but skip the release step.
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-native
      - build-wasm-browser
      - build-wasm-extism
    runs-on: ubuntu-latest
    permissions:
      # `softprops/action-gh-release` needs write access to create the
      # release and upload assets via the GitHub REST API.
      contents: write
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts

      - name: Flatten artefact tree
        # `download-artifact` nests each artefact under its name; the
        # release uploader takes a flat file list, so we move everything
        # into one directory.
        run: |
          mkdir release-files
          find artefacts -type f \( -name "*.tar.gz" -o -name "*.wasm" -o -name "*.sha256" \) -exec mv {} release-files/ \;
          ls -la release-files

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
